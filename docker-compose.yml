version: '3.8'

services:
  mariadb:
    image: mariadb:10.11
    container_name: cleaning_service_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-cleaning_service}
      MYSQL_USER: ${DB_USER:-cleaning_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-cleaning_password}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

