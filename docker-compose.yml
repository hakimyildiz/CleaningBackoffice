version: '3.8'

services:
  mariadb:
    image: mariadb:11
    container_name: mopsy_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mopsy_db_data:/var/lib/mysql
      - ./backend/config/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./backend/config/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    networks:
      - mopsy_net

  backend:
    build: ./backend
    container_name: mopsy_backend
    restart: unless-stopped
    depends_on:
      - mariadb
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: ${BACKEND_PORT}
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN}
    networks:
      - mopsy_net

  frontend:
    build: ./frontend
    container_name: mopsy_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT}:80"
    networks:
      - mopsy_net

volumes:
  mopsy_db_data:

networks:
  mopsy_net:
    driver: bridge
